"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$nix_shell\
${env_var.CLAUDE_MODEL_NERD}\
${env_var.CLAUDE_CONTEXT}\
${env_var.CLAUDE_COST}\
"""

[directory]
style = "bold cyan"
format = "[$path]($style) "
truncation_length = 2
truncate_to_repo = true
read_only = " RO"

[git_branch]
symbol = ""
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "[\\[$all_status$ahead_behind\\]]($style) "

[nix_shell]
symbol = ""
style = "bold blue"
format = "via [$symbol$state \\($name\\)]($style) "

[env_var.CLAUDE_MODEL_NERD]
variable = "CLAUDE_MODEL_NERD"
format = "[$env_value]($style) "
style = "dimmed white"

[env_var.CLAUDE_CONTEXT]
variable = "CLAUDE_CONTEXT"
format = "[$env_value]($style) "
style = "green"

[env_var.CLAUDE_COST]
variable = "CLAUDE_COST"
format = "[$env_value]($style)"
style = "dimmed white"
