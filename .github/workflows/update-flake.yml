name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Update public flake inputs
        run: >
          nix flake update
          nixpkgs
          nix-darwin
          home-manager
          git-hooks
          claude-plugins-official

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: update flake inputs"
          body: |
            Automated weekly update of public flake.lock inputs.
            Private ITP inputs are skipped (no SSH keys in CI).

            Run `sudo darwin-rebuild switch --flake .` after merging to apply.
          branch: chore/update-flake-lock
          delete-branch: true
