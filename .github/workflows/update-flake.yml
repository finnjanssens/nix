name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Update public flake inputs
        run: >
          nix flake update
          nixpkgs
          nix-darwin
          home-manager
          git-hooks
          claude-plugins-official

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout -b chore/update-flake-lock
          git add flake.lock
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update flake.lock"
          git push -f origin chore/update-flake-lock
          if gh pr view chore/update-flake-lock --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR already exists"
          else
            gh pr create \
              --title "chore: update flake inputs" \
              --body "Automated weekly update of public flake.lock inputs.
          Private ITP inputs are skipped (no SSH keys in CI).

          Run \`sudo darwin-rebuild switch --flake .\` after merging to apply." \
              --base main \
              --head chore/update-flake-lock
          fi
