name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake lock
        run: nix flake update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: update flake inputs"
          body: |
            Automated weekly update of flake.lock inputs.

            Run `sudo darwin-rebuild switch --flake .` after merging to apply.
          branch: chore/update-flake-lock
          delete-branch: true
